---
- name: Verify Docker Registry Browser systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Docker Registry Browser service to become active (up to 180s)
      ansible.builtin.systemd:
        name: docker-registry-browser.service
      register: docker_registry_browser_service
      until: docker_registry_browser_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Docker Registry Browser service is active
      ansible.builtin.assert:
        that: docker_registry_browser_service.status.ActiveState == 'active'
        fail_msg: "docker-registry-browser.service not active ({{ docker_registry_browser_service.status.ActiveState }})"
        success_msg: "docker-registry-browser.service is active"

    - name: Retrieve Docker Registry Browser service log for debugging
      when: docker_registry_browser_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu docker-registry-browser.service
      changed_when: false

    - name: Wait for Docker Registry Browser HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8080/browser"
        method: GET
        status_code: [200, 301, 302]
        follow_redirects: none
      register: docker_registry_browser_endpoint
      until: docker_registry_browser_endpoint.status in [200, 301, 302]
      retries: 120
      delay: 5

    - name: Assert Docker Registry Browser HTTP endpoint responds
      ansible.builtin.assert:
        that: docker_registry_browser_endpoint.status in [200, 301, 302]
        fail_msg: "Docker Registry Browser did not respond as expected ({{ docker_registry_browser_endpoint.status | default('no response') }})"
        success_msg: "Docker Registry Browser responded with {{ docker_registry_browser_endpoint.status }}"

    - name: Show Docker Registry Browser systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Docker Registry Browser systemd: {{ docker_registry_browser_service.status.ActiveState }}"
          - "Docker Registry Browser HTTP: {{ docker_registry_browser_endpoint.status }}"
